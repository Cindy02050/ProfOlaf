<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Progress - Snowball Sampling Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main') }}">
                <i class="fas fa-snowflake"></i> ProfOlaf - Snowball Sampling Tool
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('main') }}">
                    <i class="fas fa-home"></i> Home
                </a>
                <a class="nav-link" href="{{ url_for('database_view') }}">
                    <i class="fas fa-database"></i> Database
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">
                            <i class="fas fa-cogs"></i> Processing Progress
                        </h3>
                    </div>
                    <div class="card-body">
                        <div id="progress-container">
                            <div class="text-center mb-4">
                                <div class="spinner-border text-primary" role="status" id="spinner">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <div class="d-flex justify-content-between mb-1">
                                    <span id="current-step">Initializing...</span>
                                    <span id="progress-text">0%</span>
                                </div>
                                <div class="progress" style="height: 25px;">
                                    <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                         id="progress-bar" role="progressbar" style="width: 0%">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row text-center">
                                <div class="col-md-4">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h5 class="card-title text-primary" id="total-items">0</h5>
                                            <p class="card-text">Total Papers</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h5 class="card-title text-success" id="processed-items">0</h5>
                                            <p class="card-text">Processed</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card bg-light">
                                        <div class="card-body">
                                            <h5 class="card-title text-info" id="remaining-items">0</h5>
                                            <p class="card-text">Remaining</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-4">
                                <div class="alert alert-info" id="status-alert">
                                    <i class="fas fa-info-circle"></i>
                                    <span id="status-message">Starting processing...</span>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button class="btn btn-outline-secondary" onclick="resetProgress()">
                                    <i class="fas fa-refresh"></i> Reset
                                </button>
                                <a href="{{ url_for('main') }}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Back to Home
                                </a>
                            </div>
                        </div>
                        
                        <div id="completion-container" style="display: none;">
                            <div class="alert alert-success text-center">
                                <i class="fas fa-check-circle fa-3x mb-3"></i>
                                <h4>Processing Completed!</h4>
                                <p>All papers have been processed and saved to the database.</p>
                                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                    <a href="{{ url_for('results') }}" class="btn btn-success">
                                        <i class="fas fa-eye"></i> View Results
                                    </a>
                                    <a href="{{ url_for('database_view') }}" class="btn btn-outline-primary">
                                        <i class="fas fa-database"></i> View Database
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/progress.js') }}"></script>
</body>
</html>
